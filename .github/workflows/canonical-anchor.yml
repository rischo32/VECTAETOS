name: canonical-anchor

on:
  push:
    paths:
      - "anchors/CANONICAL_ANCHOR.md"
      - "anchors/CANONICAL_ANCHOR.sha256"
      - "scripts/hash_anchor.py"
      - ".github/workflows/canonical-anchor.yml"
  pull_request:
    paths:
      - "anchors/CANONICAL_ANCHOR.md"
      - "anchors/CANONICAL_ANCHOR.sha256"
      - "scripts/hash_anchor.py"
      - ".github/workflows/canonical-anchor.yml"

permissions:
  contents: read

jobs:
  verify-canonical-anchor:
    runs-on: ubuntu-latest

    steps:
      - name: Manual checkout
        run: |
          set -euo pipefail

          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch --depth=1 origin "$GITHUB_REF"
          else
            git fetch --depth=1 origin "$GITHUB_SHA"
          fi

          git checkout --force FETCH_HEAD

      - name: Recompute anchor hash
        run: |
          set -euo pipefail

          python3 scripts/hash_anchor.py \
            --input anchors/CANONICAL_ANCHOR.md \
            --output /tmp/CANONICAL_ANCHOR.sha256

      - name: Compare committed hash
        run: |
          set -euo pipefail

          diff -u anchors/CANONICAL_ANCHOR.sha256 /tmp/CANONICAL_ANCHOR.sha256
