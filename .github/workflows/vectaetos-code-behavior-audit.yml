name: vectaetos-code-behavior-audit

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "contracts/**/*.json"
      - "contracts/**/*.md"
      - "guards/**/*.py"
      - ".github/workflows/vectaetos-code-behavior-audit.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**/*.py"
      - "contracts/**/*.json"
      - "contracts/**/*.md"
      - "guards/**/*.py"
      - ".github/workflows/vectaetos-code-behavior-audit.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  code-behavior-audit:
    name: GUARD-03 / Code Behavior Audit / Report Only
    runs-on: ubuntu-latest

    steps:
      - name: Manual checkout without external actions
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          git init --initial-branch=main .
          git config --global --add safe.directory "$PWD"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "Checking out pull request head ${PR_HEAD_SHA}"
            git fetch --no-tags --depth=1 origin "${PR_HEAD_SHA}"
            git checkout --force FETCH_HEAD
          else
            echo "Checking out commit ${PUSH_SHA}"
            git fetch --no-tags --depth=1 origin "${PUSH_SHA}"
            git checkout --force FETCH_HEAD
          fi

      - name: Show Python version
        shell: bash
        run: |
          set -euo pipefail
          python3 --version

      - name: Validate behavior contract JSON
        shell: bash
        run: |
          set -euo pipefail
          python3 -m json.tool contracts/vectaetos_code_contract.json >/dev/null
          echo "JSON OK"

      - name: Compile VECTAETOS code behavior audit
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile guards/vectaetos_code_behavior_audit.py
          echo "PY COMPILE OK"

      - name: Run VECTAETOS code behavior audit in report-only mode
        shell: bash
        run: |
          set -euo pipefail

          set +e
          python3 guards/vectaetos_code_behavior_audit.py \
            --root . \
            --contract contracts/vectaetos_code_contract.json \
            | tee /tmp/vectaetos_code_behavior_audit.log
          AUDIT_EXIT="${PIPESTATUS[0]}"
          set -e

          {
            echo "# GUARD-03 / VECTAETOS Code Behavior Audit"
            echo ""
            echo "Mode: \`report-only\`"
            echo ""
            echo "Audit exit code: \`${AUDIT_EXIT}\`"
            echo ""
            echo '```text'
            cat /tmp/vectaetos_code_behavior_audit.log
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${AUDIT_EXIT}" -eq 2 ]; then
            echo "Code behavior audit execution/config error."
            exit 2
          fi

          if [ "${AUDIT_EXIT}" -ne 0 ]; then
            echo "Report-only mode: audit findings detected, but CI is not failed."
          fi

          exit 0
