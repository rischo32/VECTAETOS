name: EK Core / Tests and GUARD-13

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ek-core-tests:
    name: EK Core stdlib tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Python version
        shell: bash
        run: |
          set -euo pipefail
          python3 --version

      - name: Compile EK core, tests, and GUARD-13 under python -S
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONNOUSERSITE=1
          unset PYTHONPATH
          python3 -S -m py_compile ek_core/vectaetos_phi_ek_core.py
          python3 -S -m py_compile guards/ek_observable_non_authority_guard.py
          python3 -S -m py_compile tests/test_ek_core_phi_ek_core.py
          python3 -S -m py_compile tests/test_guard13_ek_observable_non_authority.py

      - name: Run EK and GUARD-13 unittest suite under python -S
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONNOUSERSITE=1
          unset PYTHONPATH
          python3 -S -m unittest discover -s tests -p "test_*.py"

  guard-13:
    name: GUARD-13 / EK observable non-authority
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GUARD-13 under python -S
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONNOUSERSITE=1
          unset PYTHONPATH
          python3 -S guards/ek_observable_non_authority_guard.py --root . --mode strict
