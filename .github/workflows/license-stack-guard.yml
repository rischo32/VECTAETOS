name: license-stack-guard

on:
  pull_request:
    paths:
      - "LICENSE.md"
      - "LICENSES/**"
      - "README.md"
      - "VECTAETOS/cli/**"
      - ".github/workflows/license-stack-guard.yml"
  push:
    branches:
      - main
    paths:
      - "LICENSE.md"
      - "LICENSES/**"
      - "README.md"
      - "VECTAETOS/cli/**"
      - ".github/workflows/license-stack-guard.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  license-stack-guard:
    name: Level 0 / Level 5 license stack guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository without external actions
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${SHA}"
          git checkout --detach FETCH_HEAD

      - name: Show Python version
        shell: bash
        run: |
          set -euo pipefail
          python3 --version

      - name: Run VECTAETOS license stack guard
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p reports

          python3 VECTAETOS/cli/license_stack_guard.py \
            --repo-root . \
            --strict \
            --format text \
            --report reports/license-stack-guard.json

      - name: Write guard report to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## VECTAETOS™ License Stack Guard"
            echo
            echo "Level 0 / Level 5 repository-state check."
            echo
            echo '```json'
            if [ -f reports/license-stack-guard.json ]; then
              cat reports/license-stack-guard.json
            else
              echo '{"status":"no report generated"}'
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          
