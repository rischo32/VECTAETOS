name: Vortex Deterministic Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  vortex-simulation:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        seed: [0,1,2,3,4]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run vortex simulation
        run: |
          python vortex/vortex_v1.2.3.py \
            --steps 1000 \
            --seed ${{ matrix.seed }} \
            --output vortex_${{ matrix.seed }}.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vortex-results
          path: vortex_*.json
