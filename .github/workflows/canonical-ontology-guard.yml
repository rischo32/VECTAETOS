name: Kanonická ontologická stráž

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  canonical-ontology-guard:
    name: Guard 01 / Canonical Ontology Boundary
    runs-on: ubuntu-latest

    steps:
      - name: Manual trusted checkout
        id: checkout
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.event.after }}
        run: |
          set -euo pipefail

          NULL_SHA="0000000000000000000000000000000000000000"
          GUARD_PATH="guards/canonical_ontology_guard.py"
          TRUSTED_GUARD="/tmp/canonical_ontology_guard.py"

          git init .
          git config --global --add safe.directory "$PWD"

          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "Manual checkout for pull_request #${PR_NUMBER}"

            if [ -z "${PR_BASE_SHA}" ] || [ -z "${PR_HEAD_SHA}" ]; then
              echo "::error title=Missing PR SHA::Pull request base/head SHA is missing."
              exit 2
            fi

            git fetch --no-tags --depth=1 origin "${PR_BASE_SHA}"

            git fetch --no-tags --depth=1 origin "pull/${PR_NUMBER}/head:refs/remotes/origin/pr-head"
            git checkout --force refs/remotes/origin/pr-head

            RESOLVED_HEAD="$(git rev-parse HEAD)"

            echo "base=${PR_BASE_SHA}" >> "${GITHUB_OUTPUT}"
            echo "head=${RESOLVED_HEAD}" >> "${GITHUB_OUTPUT}"
            echo "trusted_ref=${PR_BASE_SHA}" >> "${GITHUB_OUTPUT}"

          else
            echo "Manual checkout for push"

            BEFORE="${PUSH_BEFORE_SHA:-$NULL_SHA}"
            AFTER="${PUSH_AFTER_SHA:-$GITHUB_SHA}"

            if [ -z "${AFTER}" ]; then
              AFTER="${GITHUB_SHA}"
            fi

            git fetch --no-tags --depth=1 origin "${AFTER}"
            git checkout --force FETCH_HEAD

            if [ "${BEFORE}" != "${NULL_SHA}" ]; then
              git fetch --no-tags --depth=1 origin "${BEFORE}" || true
            fi

            RESOLVED_HEAD="$(git rev-parse HEAD)"

            echo "base=${BEFORE}" >> "${GITHUB_OUTPUT}"
            echo "head=${RESOLVED_HEAD}" >> "${GITHUB_OUTPUT}"
            echo "trusted_ref=${BEFORE}" >> "${GITHUB_OUTPUT}"
          fi

          TRUSTED_REF="$(grep '^trusted_ref=' "${GITHUB_OUTPUT}" | tail -n1 | cut -d= -f2-)"

          if [ -n "${TRUSTED_REF}" ] && [ "${TRUSTED_REF}" != "${NULL_SHA}" ] && git cat-file -e "${TRUSTED_REF}:${GUARD_PATH}" 2>/dev/null; then
            echo "Loading trusted guard from previous/base ref: ${TRUSTED_REF}"
            git show "${TRUSTED_REF}:${GUARD_PATH}" > "${TRUSTED_GUARD}"
          else
            echo "Trusted previous guard not found; using working-tree guard."
            if [ ! -f "${GUARD_PATH}" ]; then
              echo "::error title=Guard missing::${GUARD_PATH} does not exist."
              exit 2
            fi
            cp "${GUARD_PATH}" "${TRUSTED_GUARD}"
          fi

          python3 -m py_compile "${TRUSTED_GUARD}"

          echo "guard=${TRUSTED_GUARD}" >> "${GITHUB_OUTPUT}"

      - name: Run canonical ontology guard
        shell: bash
        run: |
          set -euo pipefail

          python3 "${{ steps.checkout.outputs.guard }}" \
            --base "${{ steps.checkout.outputs.base }}" \
            --head "${{ steps.checkout.outputs.head }}" \
            --mode strict
