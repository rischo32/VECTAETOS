name: Φ State Update (PR)

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  phi-update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=." >> $GITHUB_ENV

    - name: Install deps (optional)
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Run Φ update
      run: python scripts/update_readme.py

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.PAT_TOKEN }}
        commit-message: "auto(phi): update projection + diagnostics"
        branch: phi/update-${{ github.run_id }}
        title: "Φ state update"
        body: |
          Automated update:
          - glyph projection
          - diagnostics summary
          - field state snapshot

          Generated by CI (non-agentic).
        add-paths: |
          README.md
