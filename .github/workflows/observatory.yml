name: Epistemic Observatory

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  observatory:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install numpy

      - run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Run Vortex
        run: python vortex/vortex_runner.py

      - name: Update README
        run: python scripts/update_readme.py

      # 🟢 CREATE PR INSTEAD OF PUSH
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/observatory-${{ github.run_id }}
          commit-message: "auto(Φ): observatory update"
          title: "auto(Φ): observatory update"
          body: "Automated epistemic projection update."
          add-paths: |
            README.md
