name: Epistemic Observatory

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:

  observatory:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate ontology hash
        run: |
          python scripts/generate_ontology_hash.py

      - name: Update observatory
        run: |
          python scripts/ontology_observatory.py

      - name: Commit observatory data
        run: |
          git config --global user.name "vectaetos-observatory"
          git config --global user.email "observatory@vectaetos.eu"
          - name: Create Pull Request
  uses: peter-evans/create-pull-request@v6
  with:
    commit-message: update epistemic observatory
    title: Epistemic Observatory Update
    body: Automated ontology observatory update
    branch: observatory-update
    delete-branch: true
