name: Epistemic Observatory

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  observatory:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      # 1️⃣ vortex
      - name: Run Vortex (multi)
        run: python vortex/vortex_runner.py

      # DEBUG (doporučené teraz)
      - name: Debug artifacts
        run: ls -R artifacts || echo "no artifacts"

      # 2️⃣ readme
      - name: Update README projection
        run: python scripts/update_readme.py

      # 3️⃣ commit
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add artifacts/ README.md

          git diff --cached --quiet || git commit -m "auto(phi): update"

      # 4️⃣ push (CHÝBAL!)
      - name: Push changes
        run: git push
