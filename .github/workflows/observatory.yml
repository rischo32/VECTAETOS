name: Epistemic Observatory

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  observatory:
    runs-on: ubuntu-latest

    steps:
      - name: Manual checkout
        run: |
          set -euo pipefail

          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --no-tags --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Set PYTHONPATH
        run: |
          set -euo pipefail
          echo "PYTHONPATH=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"

      - name: Prepare observatory directories
        run: |
          set -euo pipefail
          mkdir -p docs/observatory
          mkdir -p scripts/observatory

      - name: Check observatory script exists
        run: |
          set -euo pipefail
          test -f scripts/observatory/epistemic_observatory.py

      - name: Run epistemic observatory
        run: |
          set -euo pipefail
          python3 scripts/observatory/epistemic_observatory.py

      - name: Show observatory output
        if: always()
        run: |
          echo "=== OBSERVATORY ==="
          ls -la docs/observatory || true
          echo ""

          if [ -f docs/observatory/OBSERVATORY_STATUS.md ]; then
            cat docs/observatory/OBSERVATORY_STATUS.md
          else
            echo "[WARN] OBSERVATORY_STATUS.md was not generated."
          fi

      - name: Detect observatory changes
        id: changes
        run: |
          set -euo pipefail

          if git status --porcelain docs/observatory | grep .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create observatory pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: auto/observatory-${{ github.run_id }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"

          git add docs/observatory/OBSERVATORY_STATUS.md
          git add docs/observatory/observatory_snapshot.json

          git commit -m "auto(Φ): observatory status update"

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force-with-lease origin "$BRANCH_NAME"

          EXISTING_PR="$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number' || true)"

          if [ -n "$EXISTING_PR" ]; then
            echo "[OK] Observatory PR already exists: #$EXISTING_PR"
          else
            gh pr create \
              --base main \
              --head "$BRANCH_NAME" \
              --title "auto(Φ): observatory status update" \
              --body "Automated non-blocking epistemic observatory status update."
          fi

      - name: No observatory changes
        if: steps.changes.outputs.changed == 'false'
        run: |
          echo "[OK] No observatory changes detected."
