name: Epistemic Observatory

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # každú hodinu

jobs:
  observatory:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # ⚠️ nutné pre push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      # 🔁 MULTI-RUN VORTEX
      - name: Run Vortex (multi)
        run: |
          python vortex/vortex_runner.py

      # 🔍 DEBUG (nech vieš čo existuje)
      - name: Debug artifacts
        run: |
          ls -la
          ls -la artifacts || true

      # 🧠 UPDATE README
      - name: Update README projection
        run: |
          python scripts/update_readme.py

      # 📝 COMMIT (LEN README!)
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add README.md

          git diff --cached --quiet || git commit -m "auto(Φ): update state"

      # 🚀 PUSH (len ak je commit)
      - name: Push changes
        run: |
          git push
