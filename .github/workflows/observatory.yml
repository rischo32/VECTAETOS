name: Epistemic Observatory

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  observatory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Run Vortex (multi)
        run: |
          python vortex/vortex_runner.py

      - name: Generate README projection
        run: |
          python scripts/update_readme.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"

          git add artifacts/ README.md
          git commit -m "auto(phi): update projection" || echo "no changes"

      - name: Push via PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: phi/auto-update
          title: "auto(phi): update projection"
          commit-message: "auto(phi): update projection"
