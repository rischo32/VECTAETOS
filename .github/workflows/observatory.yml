name: Epistemic Observatory

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  observatory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Run Vortex Simulation
        run: |
          python vortex/vortex_v1.2.3.py \
            --steps 500 \
            --seed 42 \
            --output observatory_output.json

      - name: Generate Observatory Metrics
        run: |
          python scripts/observatory_metrics.py

      - name: Upload Observatory Artifact
        uses: actions/upload-artifact@v4
        with:
          name: epistemic-observatory
          path: |
            observatory_output.json
            observatory_metrics.json
