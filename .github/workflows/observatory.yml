name: Epistemic Observatory

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  observatory:
    runs-on: ubuntu-latest

    steps:
      - name: Manual checkout
        run: |
          set -euo pipefail

          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --no-tags --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Install dependencies
        run: |
          set -euo pipefail

          python3 -m pip install --upgrade pip
          python3 -m pip install numpy matplotlib

      - name: Set PYTHONPATH
        run: |
          set -euo pipefail

          echo "PYTHONPATH=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"

      - name: Prepare observatory directories
        run: |
          set -euo pipefail

          mkdir -p artifacts
          mkdir -p docs/observatory

      - name: Check observatory inputs
        run: |
          set -euo pipefail

          echo "=== CHECKING OBSERVATORY INPUTS ==="

          if [ -f "vortex/vortex_runner.py" ]; then
            echo "[OK] vortex/vortex_runner.py found"
          else
            echo "[WARN] Missing vortex/vortex_runner.py"
            echo "[WARN] Vortex projection step will be skipped."
          fi

          if [ -f "scripts/generate_visuals.py" ]; then
            echo "[OK] scripts/generate_visuals.py found"
          else
            echo "[WARN] Missing scripts/generate_visuals.py"
            echo "[WARN] Visual generation step will be skipped."
          fi

      - name: Run Vortex projection
        run: |
          set -euo pipefail

          if [ -f "vortex/vortex_runner.py" ]; then
            python3 vortex/vortex_runner.py
          else
            echo "[SKIP] vortex/vortex_runner.py not present."
          fi

      - name: Debug artifacts
        if: always()
        run: |
          echo "=== ROOT ==="
          ls -la

          echo "=== ARTIFACTS ==="
          ls -la artifacts || true

          echo "=== DOCS / OBSERVATORY ==="
          ls -la docs/observatory || true

      - name: Generate visuals
        run: |
          set -euo pipefail

          if [ -f "scripts/generate_visuals.py" ]; then
            python3 scripts/generate_visuals.py
          else
            echo "[SKIP] scripts/generate_visuals.py not present."
          fi

      - name: Detect observatory changes
        id: changes
        run: |
          set -euo pipefail

          if git status --porcelain docs/observatory | grep .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create observatory pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: auto/observatory-${{ github.run_id }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"

          git add docs/observatory
          git commit -m "auto(Φ): observatory update"

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "$BRANCH_NAME"

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "auto(Φ): observatory update" \
            --body "Automated non-blocking epistemic projection update."

      - name: No observatory changes
        if: steps.changes.outputs.changed == 'false'
        run: |
          echo "[OK] No observatory changes detected."
