name: Epistemic Observatory

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  observatory:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      # 📦 Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 Dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib

      # 🧠 PYTHONPATH
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      # 🔁 Vortex
      - name: Run Vortex
        run: python vortex/vortex_runner.py

      # 🔍 Debug (safe)
      - name: Debug artifacts
        run: |
          ls -la
          ls -la artifacts || true
          ls -la docs/observatory || true

      # 🧠 Forensics → vizualizácia
      - name: Generate visuals
        run: python scripts/generate_visuals.py

      # 🚀 PR (žiadny push na main)
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/observatory-${{ github.run_id }}
          commit-message: "auto(Φ): observatory update"
          title: "auto(Φ): observatory update"
          body: "Automated epistemic projection update."
          add-paths: |
            docs/observatory/*.png
