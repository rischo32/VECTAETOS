name: Vortex Determinism Verification

on:
  push:
    branches: [ main ]
    paths:
      - 'vortex/**'
      - 'scripts/verify_determinism.py'
      - 'requirements.txt'
  pull_request:
    branches: [ main ]
    paths:
      - 'vortex/**'
      - 'scripts/verify_determinism.py'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  verify-determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run determinism verification
        run: python scripts/verify_determinism.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vortex-determinism-artifacts
          path: artifacts/
