name: Repository Summary

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  repository-summary:
    name: Deterministic repository summary
    runs-on: ubuntu-latest

    steps:
      - name: Manual checkout
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git init .
          git config --global --add safe.directory "$PWD"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.head.sha }}"
            git checkout --force FETCH_HEAD
          else
            git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
            git checkout --force FETCH_HEAD
          fi

      - name: Generate deterministic summary
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "# VECTAETOS Repository Summary"
            echo ""
            echo "This summary is deterministic and non-AI-generated."
            echo ""
            echo "## Current commit"
            echo ""
            echo '```text'
            git rev-parse HEAD
            echo '```'
            echo ""
            echo "## Branch context"
            echo ""
            echo '```text'
            echo "event=${GITHUB_EVENT_NAME}"
            echo "repository=${GITHUB_REPOSITORY}"
            echo '```'
            echo ""
            echo "## Top-level structure"
            echo ""
            echo '```text'
            find . -maxdepth 2 -type d \
              | sed 's#^\./##' \
              | sort \
              | head -n 120
            echo '```'
            echo ""
            echo "## Changed files"
            echo ""
            echo '```text'

            if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
              git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}" || true
              git diff --name-status "${{ github.event.pull_request.base.sha }}" HEAD || true
            else
              git show --name-status --oneline --no-renames HEAD || true
            fi

            echo '```'
            echo ""
            echo "## Guard-relevant files"
            echo ""
            echo '```text'
            find .github/workflows guards contracts scripts tests -maxdepth 3 -type f 2>/dev/null \
              | sort \
              | sed 's#^\./##' || true
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
