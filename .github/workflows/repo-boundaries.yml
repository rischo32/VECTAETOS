name: repo-boundaries

on:
  push:
    paths:
      - ".github/workflows/repo-boundaries.yml"
      - "scripts/verify_repo_boundaries.py"
      - "Core/**"
      - "EAI/**"
      - "VNAL/**"
      - "audit/**"
      - "cli/**"
      - "config/**"
      - "ek_core/**"
      - "tests/**"
      - "**/*.py"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
  pull_request:
    paths:
      - ".github/workflows/repo-boundaries.yml"
      - "scripts/verify_repo_boundaries.py"
      - "Core/**"
      - "EAI/**"
      - "VNAL/**"
      - "audit/**"
      - "cli/**"
      - "config/**"
      - "ek_core/**"
      - "tests/**"
      - "**/*.py"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"

permissions:
  contents: read

jobs:
  verify-repo-boundaries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository without external actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git -c http.extraheader="AUTHORIZATION: bearer ${GITHUB_TOKEN}" \
              fetch --depth=1 origin "${GITHUB_REF}"
          else
            git -c http.extraheader="AUTHORIZATION: bearer ${GITHUB_TOKEN}" \
              fetch --depth=1 origin "${GITHUB_SHA}"
          fi

          git checkout --force FETCH_HEAD

      - name: Verify Python
        run: |
          set -euo pipefail
          python3 --version

      - name: Verify no reverse imports or forbidden dependencies
        run: |
          set -euo pipefail
          python3 scripts/verify_repo_boundaries.py
