name: repo-boundaries

on:
  push:
    paths:
      - "**/*.py"
      - "**/*.md"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
  pull_request:
    paths:
      - "**/*.py"
      - "**/*.md"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"

permissions:
  contents: read

jobs:
  verify-repo-boundaries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository without external actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git init --initial-branch=main .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${GITHUB_REF}"
          else
            git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
          fi

          git checkout --force FETCH_HEAD

      - name: Verify Python
        run: |
          set -euo pipefail
          python3 --version

      - name: Verify no reverse imports or forbidden dependencies
        run: |
          set -euo pipefail
          python3 scripts/verify_repo_boundaries.py
