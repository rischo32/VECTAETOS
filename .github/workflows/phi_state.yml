name: Φ State Update

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Manual checkout
        run: |
          set -euo pipefail

          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --no-tags --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Set PYTHONPATH
        run: |
          set -euo pipefail

          echo "PYTHONPATH=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"

      - name: Check repository state
        run: |
          set -euo pipefail

          echo "=== Φ State Update ==="
          echo "Repository: $GITHUB_REPOSITORY"
          echo "SHA: $GITHUB_SHA"
          echo "Actor: $GITHUB_ACTOR"

          echo "=== ROOT ==="
          ls -la

      - name: Optional requirements visibility
        run: |
          set -euo pipefail

          if [ -f requirements.txt ]; then
            echo "[INFO] requirements.txt present."
            echo "[INFO] Dependency installation intentionally skipped in Φ State Update."
          else
            echo "[INFO] No requirements.txt present."
          fi

      - name: No-op state
        run: |
          echo "[OK] Φ State Update is currently a guarded no-op."
          echo "[OK] No files modified."
          echo "[OK] No commit created."
          echo "[OK] No push performed."
