name: Φ State Update

on:
  push:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install deps
      run: pip install -r requirements.txt || true

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=." >> $GITHUB_ENV
