name: Kanonická ontologická stráž

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  canonical-check:
    name: Detekcia modifikácií kanonickej ontológie
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect canonical ontology modifications
        shell: bash
        run: |
          set -euo pipefail

          echo "Kontrola kanonických ontologických súborov..."

          PROTECTED_RE='(^|/)anchors/.*\.md$|(^|/)formal/.*\.md$|(^|/)FORMAL_.*\.md$|(^|/)FORMÁLNE_.*\.md$|(^|/)CANONICAL_ANCHORS\.md$|(^|/)KANONICKÉ_KOTVY\.md$|(^|/)MECHANIZATION_OF_ZMYSEL\.md$|(^|/)MECHANIZÁCIA_ZMYSEL\.md$|(^|/)MECHANIZÁCIA_ZMYSLU\.md$|(^|/)epistemic_space\.md$|(^|/)epistemický_priestor\.md$|(^|/)VECTAETOS_Specification\.md$|(^|/)VECTAETOS_v1\.0_Frozen_Ontological_Core\.md$'

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_REF="refs/remotes/origin/${GITHUB_BASE_REF}"
            git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}:${BASE_REF}"
            CHANGED="$(git diff --name-only "${BASE_REF}...HEAD" | grep -E "${PROTECTED_RE}" || true)"
          else
            NULL_SHA="0000000000000000000000000000000000000000"
            BEFORE="${{ github.event.before }}"
            AFTER="${GITHUB_SHA}"

            if [ "${BEFORE}" = "${NULL_SHA}" ]; then
              CHANGED="$(git ls-files | grep -E "${PROTECTED_RE}" || true)"
            else
              CHANGED="$(git diff --name-only "${BEFORE}" "${AFTER}" | grep -E "${PROTECTED_RE}" || true)"
            fi
          fi

          if [ -n "${CHANGED}" ]; then
            echo ""
            echo "🚨 Upravené súbory s kanonickou ontológiou:"
            printf '%s\n' "${CHANGED}"
            echo ""
            echo "CHYBA: Zistená modifikácia ontologickej vrstvy."
            echo "Kanonické súbory sa nesmú meniť bez explicitného ontologického protokolu."
            echo ""
            echo "Tento guard nemení ontológiu. Iba failuje CI pri zásahu do chránenej vrstvy."
            exit 1
          fi

          echo "✅ Zachovaná integrita kanonickej ontológie."
