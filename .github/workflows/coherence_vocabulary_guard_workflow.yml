name: Coherence Vocabulary Guard

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  GUARD_MODE: report

jobs:
  coherence-vocabulary-guard:
    name: GUARD-12 / Coherence Vocabulary Boundary
    runs-on: ubuntu-latest

    steps:
      - name: Manual repository checkout
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "refs/pull/${PR_NUMBER}/merge"
          else
            git fetch --no-tags --depth=1 origin "${COMMIT_SHA}"
          fi

          git checkout --detach FETCH_HEAD

      - name: Prepare reports directory
        shell: bash
        run: mkdir -p reports

      - name: Run GUARD-12
        id: coherence_vocabulary_guard
        shell: bash
        run: |
          set -euo pipefail

          set +e
          python3 guards/coherence_vocabulary_guard.py \
            --root . \
            --mode "${GUARD_MODE}" \
            --json-out reports/coherence_vocabulary_guard.json \
            | tee /tmp/coherence_vocabulary_guard.log
          GUARD_EXIT="${PIPESTATUS[0]}"
          set -e

          {
            echo "# GUARD-12 / Coherence Vocabulary Guard"
            echo ""
            echo "Mode: \`${GUARD_MODE}\`"
            echo ""
            echo "Guard exit code: \`${GUARD_EXIT}\`"
            echo ""
            echo '```text'
            cat /tmp/coherence_vocabulary_guard.log
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${GUARD_EXIT}" -eq 2 ]; then
            echo "Coherence vocabulary guard execution/config error."
            exit 2
          fi

          if [ "${GUARD_MODE}" = "strict" ] && [ "${GUARD_EXIT}" -ne 0 ]; then
            echo "Strict mode: coherence vocabulary findings detected."
            exit 1
          fi

          if [ "${GUARD_EXIT}" -ne 0 ]; then
            echo "Report-only mode: findings detected, but CI is not failed."
          fi

          exit 0

      - name: Show JSON report
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          echo "## GUARD-12 JSON report" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"

          if [ -f reports/coherence_vocabulary_guard.json ]; then
            echo '```json' >> "${GITHUB_STEP_SUMMARY}"
            cat reports/coherence_vocabulary_guard.json >> "${GITHUB_STEP_SUMMARY}"
            echo '```' >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "No JSON report produced." >> "${GITHUB_STEP_SUMMARY}"
          fi
