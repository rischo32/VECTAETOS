name: semantic-integrity

on:
  push:
    paths:
      - "**/*.md"
      - "**/*.txt"
      - "**/*.py"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - "guards/vectaetos_boundary_guard.py"
      - "scripts/verify_semantic_integrity.py"
      - ".github/workflows/semantic-integrity.yml"

  pull_request:
    paths:
      - "**/*.md"
      - "**/*.txt"
      - "**/*.py"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - "guards/vectaetos_boundary_guard.py"
      - "scripts/verify_semantic_integrity.py"
      - ".github/workflows/semantic-integrity.yml"

permissions:
  contents: read

jobs:
  verify-semantic-integrity:
    runs-on: ubuntu-latest

    steps:
      - name: Manual trusted checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          set -euo pipefail

          git init --initial-branch=main .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "refs/pull/${PR_NUMBER}/head"
          else
            git fetch --no-tags --depth=1 origin "${GITHUB_SHA_VALUE}"
          fi

          git checkout --force FETCH_HEAD

      - name: Verify Python
        run: |
          set -euo pipefail
          python3 --version

      - name: Compile semantic boundary guard
        run: |
          set -euo pipefail
          python3 -m py_compile guards/vectaetos_boundary_guard.py

      - name: Run VECTAETOS boundary guard
        run: |
          set -euo pipefail
          python3 guards/vectaetos_boundary_guard.py --root . --mode report

      - name: Run legacy semantic integrity verifier if present
        run: |
          set -euo pipefail

          if [ -f scripts/verify_semantic_integrity.py ]; then
            echo "Legacy semantic verifier present."
            echo "Running in report-only compatibility mode."

            set +e
            python3 scripts/verify_semantic_integrity.py
            status="$?"
            set -e

            if [ "${status}" -ne 0 ]; then
              echo "Legacy verifier returned ${status}."
              echo "Non-blocking during semantic calibration."
            fi
          else
            echo "No legacy semantic verifier found."
          fi
