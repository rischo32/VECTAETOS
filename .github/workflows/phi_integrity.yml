name: Φ Integrity Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  phi-test:
    runs-on: ubuntu-latest

    steps:
      - name: Manual checkout
        run: |
          set -euo pipefail

          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$GITHUB_REF"
          else
            git fetch --no-tags --depth=1 origin "$GITHUB_SHA"
          fi

          git checkout --force FETCH_HEAD

      - name: Install dependencies
        run: |
          set -euo pipefail

          python3 -m pip install --upgrade pip
          python3 -m pip install pytest numpy

      - name: Set PYTHONPATH
        run: |
          set -euo pipefail

          echo "PYTHONPATH=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"

      - name: Check tests directory exists
        run: |
          set -euo pipefail

          test -d tests

      - name: Ensure tests are collectable
        run: |
          set -euo pipefail

          python3 -m pytest tests/ --collect-only -q

      - name: Run Φ integrity tests
        run: |
          set -euo pipefail

          python3 -m pytest tests/ -q -W error
