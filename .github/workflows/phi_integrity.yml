name: Φ Integrity Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  phi-test:
    runs-on: ubuntu-latest

    steps:

    # ------------------------
    # CHECKOUT
    # ------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ------------------------
    # PYTHON
    # ------------------------
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ------------------------
    # INSTALL
    # ------------------------
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy

    # ------------------------
    # PYTHONPATH (CRITICAL)
    # ------------------------
    - name: Set PYTHONPATH
      run: |
        echo "PYTHONPATH=${PYTHONPATH}:." >> $GITHUB_ENV

    # ------------------------
    # Φ TEST SUITE
    # ------------------------
    - name: Run Φ integrity tests (STRICT)
      run: |
        pytest tests/ -q -W error

    # ------------------------
    # FAIL IF EMPTY (GUARD)
    # ------------------------
    - name: Ensure tests executed
      run: |
        count=$(pytest tests/ --collect-only -q | wc -l)
        if [ "$count" -eq "0" ]; then
          echo "No tests collected → INVALID"
          exit 1
        fi
