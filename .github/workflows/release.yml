name: Release + EK Notarization

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Manual checkout
        run: |
          set -euo pipefail

          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --no-tags --depth=1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Validate release inputs
        run: |
          set -euo pipefail

          test -f README.md
          test -d EAI
          command -v tar
          command -v sha256sum
          command -v gh

      - name: Create deterministic artifact
        run: |
          set -euo pipefail

          rm -rf artifact vectaetos_artifact.tar.gz artifact_hash.txt

          mkdir -p artifact
          cp -r EAI artifact/
          cp README.md artifact/

          tar \
            --sort=name \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --mtime='UTC 2026-01-01' \
            -czf vectaetos_artifact.tar.gz \
            artifact/

      - name: Compute EK artifact hash
        id: hash
        run: |
          set -euo pipefail

          HASH="$(sha256sum vectaetos_artifact.tar.gz | awk '{print $1}')"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "$HASH" > artifact_hash.txt
          echo "Artifact hash: $HASH"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          ARTIFACT_HASH: ${{ steps.hash.outputs.hash }}
        run: |
          set -euo pipefail

          RELEASE_NOTES="$(mktemp)"
          {
            echo "# VECTAETOS Release $TAG_NAME"
            echo ""
            echo "## EK Notarization"
            echo ""
            echo "\`\`\`text"
            echo "artifact: vectaetos_artifact.tar.gz"
            echo "sha256:  $ARTIFACT_HASH"
            echo "\`\`\`"
            echo ""
            echo "This release artifact is notarized by SHA-256 fingerprint."
          } > "$RELEASE_NOTES"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "[INFO] Release exists. Uploading artifacts with clobber."
            gh release upload "$TAG_NAME" \
              vectaetos_artifact.tar.gz \
              artifact_hash.txt \
              --clobber
          else
            echo "[INFO] Creating release."
            gh release create "$TAG_NAME" \
              vectaetos_artifact.tar.gz \
              artifact_hash.txt \
              --title "$TAG_NAME" \
              --notes-file "$RELEASE_NOTES"
          fi
