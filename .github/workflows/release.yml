name: Release + EK Notarization

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest

      # ------------------------------
      # BUILD ARTIFACT
      # ------------------------------
      - name: Create artifact
        run: |
          mkdir artifact
          cp -r EAI artifact/
          cp README.md artifact/
          tar -czf vectaetos_artifact.tar.gz artifact/

      # ------------------------------
      # HASH (EK CORE)
      # ------------------------------
      - name: Compute artifact hash
        id: hash
        run: |
          HASH=$(sha256sum vectaetos_artifact.tar.gz | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Artifact hash: $HASH"

      # ------------------------------
      # SAVE HASH FILE (EK TRACE)
      # ------------------------------
      - name: Save EK fingerprint
        run: |
          echo "${{ steps.hash.outputs.hash }}" > artifact_hash.txt

      # ------------------------------
      # CREATE GITHUB RELEASE
      # ------------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vectaetos_artifact.tar.gz
            artifact_hash.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
