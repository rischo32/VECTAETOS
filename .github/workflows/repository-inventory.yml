name: Repository Inventory

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "formal/**"
      - "anchors/**"
      - "VECTAETOS_MASTER_INDEX.md"
      - "guards/master_index_router_guard.py"

permissions:
  contents: read

jobs:
  repository-inventory:
    name: Generate /formal and /anchors inventory
    runs-on: ubuntu-latest

    steps:
      - name: Manual trusted checkout
        id: checkout
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          NULL_SHA="0000000000000000000000000000000000000000"
          GUARD_PATH="guards/master_index_router_guard.py"
          TRUSTED_GUARD="/tmp/master_index_router_guard.py"

          git init .
          git config --global --add safe.directory "$PWD"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "Manual checkout for pull_request #${PR_NUMBER}"

            if [ -z "${PR_BASE_SHA}" ]; then
              echo "::error title=Missing PR base SHA::Pull request base SHA is missing."
              exit 2
            fi

            git fetch --no-tags --depth=1 origin "${PR_BASE_SHA}"
            git fetch --no-tags --depth=1 origin "pull/${PR_NUMBER}/head:refs/remotes/origin/pr-head"
            git checkout --force refs/remotes/origin/pr-head

            TRUSTED_REF="${PR_BASE_SHA}"
          else
            echo "Manual checkout for workflow_dispatch"
            git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
            git checkout --force FETCH_HEAD

            TRUSTED_REF="${NULL_SHA}"
          fi

          if [ -n "${TRUSTED_REF}" ] && [ "${TRUSTED_REF}" != "${NULL_SHA}" ] && git cat-file -e "${TRUSTED_REF}:${GUARD_PATH}" 2>/dev/null; then
            echo "Loading trusted router guard from base ref: ${TRUSTED_REF}"
            git show "${TRUSTED_REF}:${GUARD_PATH}" > "${TRUSTED_GUARD}"
          else
            echo "Trusted previous router guard not found; using working-tree guard."
            if [ ! -f "${GUARD_PATH}" ]; then
              echo "::error title=Router guard missing::${GUARD_PATH} does not exist."
              exit 2
            fi
            cp "${GUARD_PATH}" "${TRUSTED_GUARD}"
          fi

          python3 -m py_compile "${TRUSTED_GUARD}"

          echo "guard=${TRUSTED_GUARD}" >> "${GITHUB_OUTPUT}"

      - name: Generate repository inventory
        shell: bash
        run: |
          set -euo pipefail

          INVENTORY_FILE="VECTAETOS_REPOSITORY_INVENTORY.generated.md"

          python3 "${{ steps.checkout.outputs.guard }}" \
            --mode inventory \
            --roots formal anchors \
            --output "${INVENTORY_FILE}"

          echo "Generated inventory:"
          echo "--------------------"
          cat "${INVENTORY_FILE}"

          {
            echo "# Repository Inventory"
            echo ""
            echo "Generated file: \`${INVENTORY_FILE}\`"
            echo ""
            echo "\`\`\`text"
            sha256sum "${INVENTORY_FILE}"
            echo "\`\`\`"
            echo ""
            echo "## Inventory"
            echo ""
            cat "${INVENTORY_FILE}"
          } >> "${GITHUB_STEP_SUMMARY}"
