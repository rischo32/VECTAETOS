name: Glyph Projection

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  glyph:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate glyph
        run: python scripts/generate_glyph.py

      # 🟢 PR miesto push
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/glyph-${{ github.run_id }}
          commit-message: "auto(Φ): glyph update"
          title: "auto(Φ): glyph update"
          body: "Automated glyph projection update."
          add-paths: |
            docs/glyphs/*
