name: Ontology Guard

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ontology-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install import-linter grimp

      - name: Debug repository structure
        run: |
          echo "Repository structure:"
          ls -R

      - name: Verify Python packages
        run: |
          echo "Checking package visibility"
          python -c "
import os
packages = ['Core','vortex','epistemic_cryptography','formal']
for p in packages:
    init = os.path.join(p,'__init__.py')
    print(p+': OK' if os.path.exists(init) else p+': MISSING '+init)"
