name: Ontology Guard

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ontology-check:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Verify ontology hash
        run: |
          python scripts/check_ontology_hash.py
