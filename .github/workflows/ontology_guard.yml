name: Φ Ontology Guard

on:
  push:
    branches: [ main ]
    paths:
      - 'VECTAETOS_MASTER_INDEX.md'
      - 'formal/**'
      - 'Core/**'
      - 'governance/**'
      - 'scripts/audit/**'

  pull_request:
    branches: [ main ]
    paths:
      - 'VECTAETOS_MASTER_INDEX.md'
      - 'formal/**'
      - 'Core/**'
      - 'governance/**'
      - 'scripts/audit/**'

  workflow_dispatch:

jobs:
  ontology-integrity:
    runs-on: ubuntu-latest

    steps:
      # ============================================
      # 1. Checkout
      # ============================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================================
      # 2. Setup Python
      # ============================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ============================================
      # 3. Debug (anti path drift)
      # ============================================
      - name: Debug repository structure
        run: |
          echo "=== STRUCTURE ==="
          ls -R

      # ============================================
      # 4. Ensure artifacts
      # ============================================
      - name: Ensure artifacts directory
        run: mkdir -p artifacts

      # ============================================
      # 5. Hard path guards
      # ============================================
      - name: Check hash guard exists
        run: test -f scripts/audit/check_ontology_hash.py

      - name: Check language guard exists
        run: test -f scripts/audit/check_ontology_language.py

      - name: Check governance guard exists
        run: test -f scripts/audit/check_governance_rules.py

      # ============================================
      # 6. STRUCTURE — Ontology Hash
      # ============================================
      - name: Ontology hash guard
        run: |
          echo "=== HASH GUARD ==="
          python scripts/audit/check_ontology_hash.py

      # ============================================
      # 7. MEANING — Language Guard
      # ============================================
      - name: Ontology language guard
        run: |
          echo "=== LANGUAGE GUARD ==="
          python scripts/audit/check_ontology_language.py

      # ============================================
      # 8. GOVERNANCE — Rule Enforcement
      # ============================================
      - name: Governance guard
        run: |
          echo "=== GOVERNANCE GUARD ==="
          python scripts/audit/check_governance_rules.py

      # ============================================
      # 9. Upload artifacts
      # ============================================
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ontology-artifacts
          path: artifacts/
