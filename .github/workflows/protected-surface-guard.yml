name: Guard PIS 01 / Minimal Protected Surface

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  protected-surface-guard:
    name: Guard PIS 01 / Minimal Protected Surface
    runs-on: ubuntu-24.04

    steps:
      - name: Manual trusted checkout
        id: checkout
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          NULL_SHA="0000000000000000000000000000000000000000"
          REPO_ROOT="${PWD}"
          TRUSTED_ROOT=".trusted/base"
          TRUSTED_ROOT_ABS="${REPO_ROOT}/${TRUSTED_ROOT}"
          TRUSTED_LOG_DIR=".trusted/logs"
          TRUSTED_LOG_ABS="${REPO_ROOT}/${TRUSTED_LOG_DIR}"

          TRUSTED_GUARD_REL="guards/protected_surface_guard.py"
          TRUSTED_MANIFEST_REL="research/pis/protected_surface_manifest.minimal.json"
          UNLOCK_DIR_REL="research/pis/unlocks"

          if [ ! -d .git ]; then
            git init .
          fi

          git config --global --add safe.directory "$PWD"
          git remote remove origin 2>/dev/null || true
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          BASE_REF=""
          HEAD_REF=""
          TRUSTED_REF=""
          BOOTSTRAP_MODE="false"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "Manual trusted checkout for pull request #${PR_NUMBER}"

            if [ -z "${PR_BASE_SHA:-}" ] || [ -z "${PR_HEAD_SHA:-}" ] || [ -z "${PR_NUMBER:-}" ]; then
              echo "::error title=Missing pull request metadata::Pull request base/head SHA or PR number is missing."
              exit 2
            fi

            git fetch --no-tags --depth=1 origin "${PR_BASE_SHA}"
            git fetch --no-tags --depth=1 origin "pull/${PR_NUMBER}/head:refs/remotes/origin/pr-head"
            git checkout --force refs/remotes/origin/pr-head

            BASE_REF="${PR_BASE_SHA}"
            HEAD_REF="$(git rev-parse HEAD)"
            TRUSTED_REF="${PR_BASE_SHA}"
          else
            echo "Manual trusted checkout for push"

            BEFORE="${PUSH_BEFORE_SHA:-$NULL_SHA}"
            AFTER="${PUSH_AFTER_SHA:-$GITHUB_SHA}"

            if [ -z "${AFTER}" ]; then
              AFTER="${GITHUB_SHA}"
            fi

            git fetch --no-tags --depth=1 origin "${AFTER}"
            git checkout --force FETCH_HEAD

            if [ "${BEFORE}" != "${NULL_SHA}" ]; then
              git fetch --no-tags --depth=1 origin "${BEFORE}" || true
            fi

            BASE_REF="${BEFORE}"
            HEAD_REF="$(git rev-parse HEAD)"
            TRUSTED_REF="${BEFORE}"
          fi

          rm -rf ".trusted"
          mkdir -p "${TRUSTED_ROOT_ABS}/guards/core" "${TRUSTED_LOG_ABS}"

          echo "Resolved base ref: ${BASE_REF}"
          echo "Resolved head ref: ${HEAD_REF}"
          echo "Resolved trusted ref: ${TRUSTED_REF}"

          write_trusted_file() {
            local rel_path="$1"
            local out_path="${TRUSTED_ROOT_ABS}/${rel_path}"

            mkdir -p "$(dirname "${out_path}")"

            if [ -n "${TRUSTED_REF}" ] && [ "${TRUSTED_REF}" != "${NULL_SHA}" ] && git cat-file -e "${TRUSTED_REF}:${rel_path}" 2>/dev/null; then
              git show "${TRUSTED_REF}:${rel_path}" > "${out_path}"
              return 0
            fi

            return 1
          }

          if ! write_trusted_file "${TRUSTED_GUARD_REL}"; then
            echo "::warning title=Bootstrap mode::Trusted PIS guard not found on base/previous ref; using current working tree guard."
            if [ ! -f "${TRUSTED_GUARD_REL}" ]; then
              echo "::error title=Guard missing::${TRUSTED_GUARD_REL} does not exist in working tree."
              exit 2
            fi
            cp "${TRUSTED_GUARD_REL}" "${TRUSTED_ROOT_ABS}/${TRUSTED_GUARD_REL}"
            BOOTSTRAP_MODE="true"
          fi

          if ! write_trusted_file "${TRUSTED_MANIFEST_REL}"; then
            echo "::warning title=Manifest bootstrap mode::Trusted PIS manifest not found on base/previous ref; using current working tree manifest."
            if [ ! -f "${TRUSTED_MANIFEST_REL}" ]; then
              echo "::error title=PIS manifest missing::${TRUSTED_MANIFEST_REL} does not exist in working tree."
              exit 2
            fi
            mkdir -p "${TRUSTED_ROOT_ABS}/$(dirname "${TRUSTED_MANIFEST_REL}")"
            cp "${TRUSTED_MANIFEST_REL}" "${TRUSTED_ROOT_ABS}/${TRUSTED_MANIFEST_REL}"
            BOOTSTRAP_MODE="true"
          fi

          CORE_FILES=(
            "guards/core/findings.py"
            "guards/core/reporting.py"
            "guards/core/contracts.py"
            "guards/core/text_scan.py"
            "guards/core/ast_scan.py"
            "guards/core/paths.py"
            "guards/core/roles.py"
            "guards/core/perimeter.py"
            "guards/core/capabilities.py"
            "guards/core/immutable_blob.py"
          )

          for rel_path in "${CORE_FILES[@]}"; do
            if ! write_trusted_file "${rel_path}"; then
              if [ "${BOOTSTRAP_MODE}" = "true" ] && [ -f "${rel_path}" ]; then
                cp "${rel_path}" "${TRUSTED_ROOT_ABS}/${rel_path}"
              fi
            fi
          done

          # Unlock records are PR-supplied evidence records, not trusted runtime code.
          # Copy them into the trusted execution tree so the trusted guard can validate
          # exact-path solo-maintainer unlocks while still using base-ref policy.
          if [ -d "${UNLOCK_DIR_REL}" ]; then
            while IFS= read -r -d '' unlock_file; do
              mkdir -p "${TRUSTED_ROOT_ABS}/$(dirname "${unlock_file}")"
              cp "${unlock_file}" "${TRUSTED_ROOT_ABS}/${unlock_file}"
            done < <(find "${UNLOCK_DIR_REL}" -type f -name 'UNLOCK-*.json' -print0)
          fi

          : > "${TRUSTED_ROOT_ABS}/guards/__init__.py"
          : > "${TRUSTED_ROOT_ABS}/guards/core/__init__.py"

          while IFS= read -r -d '' pyfile; do
            python3 -m py_compile "${pyfile}"
          done < <(find "${TRUSTED_ROOT_ABS}" -type f -name '*.py' -print0)

          echo "base=${BASE_REF}" >> "${GITHUB_OUTPUT}"
          echo "head=${HEAD_REF}" >> "${GITHUB_OUTPUT}"
          echo "trusted_ref=${TRUSTED_REF}" >> "${GITHUB_OUTPUT}"
          echo "repo_root=${REPO_ROOT}" >> "${GITHUB_OUTPUT}"
          echo "trusted_root=${TRUSTED_ROOT}" >> "${GITHUB_OUTPUT}"
          echo "trusted_root_abs=${TRUSTED_ROOT_ABS}" >> "${GITHUB_OUTPUT}"
          echo "trusted_guard=${TRUSTED_ROOT_ABS}/${TRUSTED_GUARD_REL}" >> "${GITHUB_OUTPUT}"
          echo "trusted_manifest=${TRUSTED_ROOT_ABS}/${TRUSTED_MANIFEST_REL}" >> "${GITHUB_OUTPUT}"
          echo "trusted_log=${TRUSTED_LOG_ABS}/protected_surface_guard.log" >> "${GITHUB_OUTPUT}"
          echo "bootstrap_mode=${BOOTSTRAP_MODE}" >> "${GITHUB_OUTPUT}"

      - name: Run minimal protected surface guard
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          REPO_ROOT="${{ steps.checkout.outputs.repo_root }}"
          TRUSTED_ROOT_ABS="${{ steps.checkout.outputs.trusted_root_abs }}"
          LOG_PATH="${{ steps.checkout.outputs.trusted_log }}"

          mkdir -p "$(dirname "${LOG_PATH}")"

          set +e
          (
            cd "${TRUSTED_ROOT_ABS}"

            GIT_DIR="${REPO_ROOT}/.git" \
            GIT_WORK_TREE="${REPO_ROOT}" \
            PYTHONPATH="${TRUSTED_ROOT_ABS}" \
            python3 "guards/protected_surface_guard.py" \
              --base "${{ steps.checkout.outputs.base }}" \
              --head "${{ steps.checkout.outputs.head }}" \
              --manifest "research/pis/protected_surface_manifest.minimal.json" \
              --mode strict
          ) | tee "${LOG_PATH}"

          GUARD_EXIT="${PIPESTATUS[0]}"
          set -e

          echo "exit_code=${GUARD_EXIT}" >> "${GITHUB_OUTPUT}"

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          LOG_PATH="${{ steps.checkout.outputs.trusted_log }}"
          EXIT_CODE="${{ steps.guard.outputs.exit_code }}"
          BASE_REF="${{ steps.checkout.outputs.base }}"
          HEAD_REF="${{ steps.checkout.outputs.head }}"
          TRUSTED_REF="${{ steps.checkout.outputs.trusted_ref }}"
          BOOTSTRAP="${{ steps.checkout.outputs.bootstrap_mode }}"

          {
            echo "# Guard PIS 01 / Minimal Protected Surface"
            echo ""
            echo "- Mode: \`strict\`"
            echo "- Exit code: \`${EXIT_CODE}\`"
            echo "- Base ref: \`${BASE_REF}\`"
            echo "- Head ref: \`${HEAD_REF}\`"
            echo "- Trusted ref: \`${TRUSTED_REF}\`"
            echo "- Bootstrap mode: \`${BOOTSTRAP}\`"
            echo ""
            echo '```text'
            if [ -f "${LOG_PATH}" ]; then
              cat "${LOG_PATH}"
            else
              echo "No guard log was produced."
            fi
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Enforce guard result
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          EXIT_CODE="${{ steps.guard.outputs.exit_code }}"

          case "${EXIT_CODE}" in
            0)
              echo "Minimal protected surface guard passed within declared perimeter."
              exit 0
              ;;
            1)
              echo "::error title=Protected surface blocker detected::Configured protected-surface finding detected within declared perimeter."
              exit 1
              ;;
            2)
              echo "::error title=Protected surface guard execution error::Guard failed to execute cleanly."
              exit 2
              ;;
            *)
              echo "::error title=Unexpected guard exit code::Unexpected exit code: ${EXIT_CODE}"
              exit 2
              ;;
          esac
