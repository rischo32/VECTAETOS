<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epistemic Mirror</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Epistemic Mirror</h1>

    <textarea 
      id="questionInput"
      maxlength="100"
      placeholder="Zadaj svoju otázku (max 100 znakov)...">
    </textarea>

    <div class="counter">
      <span id="charCount">0</span>/100
    </div>

    <button id="analyzeBtn">
      Unlock Projection — 1€
    </button>

    <div id="output" class="hidden">

      <h2>Epistemic Projection</h2>

      <div class="projection-block" id="projectionData"></div>

      <h3>Mirror Question</h3>
      <div class="mirror-block" id="mirrorQuestion"></div>

      <div class="signature">
        — Epistemic Mirror
      </div>

    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
