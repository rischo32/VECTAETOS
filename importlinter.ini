[importlinter]
root_package = vortex

[importlinter:contract:vortex_isolation]
name = Vortex core must stay isolated
type = forbidden
source_modules =
    vortex
forbidden_modules =
    epistemic
    projections
    gate

[importlinter:contract:epistemic_independent]
name = Epistemic layer must not depend on simulation
type = forbidden
source_modules =
    epistemic
forbidden_modules =
    vortex
