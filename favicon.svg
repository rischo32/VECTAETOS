<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="VECTAETOS animated Phi glyph">
  <style>
    @keyframes orbitRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .orbit {
      transform-origin: 50px 50px;
      animation: orbitRotate 60s linear infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      .orbit { animation: none; }
    }
  </style>

  <rect width="100" height="100" rx="18" fill="#050505"/>
  <circle class="orbit" cx="50" cy="50" r="39" fill="none" stroke="#FF6B00" stroke-width="5" stroke-linecap="round" stroke-dasharray="18 14"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="#eaeaea" stroke-width="7"/>
  <line x1="50" y1="16" x2="50" y2="84" stroke="#eaeaea" stroke-width="7" stroke-linecap="round"/>
  <circle cx="50" cy="50" r="5" fill="#FF6B00"/>
</svg>
